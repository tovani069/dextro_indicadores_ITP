<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PE · IT Protect</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0F14;--bg2:#151820;--bg3:#1C2030;--bg4:#232740;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#F0F2F5;--text2:#B8BDD0;--text3:#6E748A;
  --accent:#C8CDD8;--accent-lt:rgba(200,205,216,0.12);
  --shadow:0 4px 20px rgba(0,0,0,0.4);--shadow-lg:0 8px 40px rgba(0,0,0,0.5);
}
[data-theme="light"]{
  --bg:#F4F5F7;--bg2:#FFFFFF;--bg3:#F0F1F4;--bg4:#E8EAF0;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.11);
  --text:#1A1D2E;--text2:#5A5F7A;--text3:#9096B0;
  --accent:#1C2856;--accent-lt:#EEF0F8;
  --shadow:0 1px 4px rgba(0,0,0,0.08),0 4px 16px rgba(0,0,0,0.05);
  --shadow-lg:0 2px 8px rgba(0,0,0,0.10),0 8px 32px rgba(0,0,0,0.08);
}
body{font-family:"IBM Plex Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.mono{font-family:"IBM Plex Mono",monospace}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:100;height:76px;background:var(--bg2);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 20px;gap:12px;box-shadow:var(--shadow)}
.nav-logo{height:44px;object-fit:contain}
[data-theme="light"] .logo-dark{display:block}
[data-theme="light"] .logo-white{display:none}
[data-theme="dark"] .logo-dark{display:none}
[data-theme="dark"] .logo-white{display:block}
.nav-divider{width:1px;height:32px;background:var(--border2);margin:0 8px}
.nav-title{font-size:15px;font-weight:600;color:var(--text)}
.nav-sub{font-size:10px;color:var(--text3);font-family:"IBM Plex Mono",monospace}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-date{font-size:11px;font-family:"IBM Plex Mono",monospace;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:6px}
.btn-icon{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.btn-icon:hover{background:var(--bg4)}

/* LAYOUT */
.layout{display:flex;flex:1}

/* SIDEBAR */
.sidebar{width:224px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:76px;height:calc(100vh - 76px);overflow-y:auto;transition:width .25s}
.sidebar.collapsed{width:0;overflow:hidden}
.sidebar-nav{padding:12px 8px 0}
.nav-btn{width:100%;display:flex;align-items:center;gap:8px;padding:9px 10px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;font-size:13px;font-family:"IBM Plex Sans",sans-serif;text-align:left;position:relative;margin-bottom:2px;transition:background .15s}
.nav-btn:hover{background:var(--bg3)}
.nav-btn.active{background:var(--accent-lt);border-left:3px solid var(--accent);padding-left:7px;color:var(--text)}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-badge{font-size:10px;font-family:"IBM Plex Mono",monospace;padding:1px 6px;border-radius:10px;background:var(--bg4);color:var(--text3)}
.nav-badge.risk{background:rgba(255,92,106,.2);color:#FF5C6A;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.nav-sep{height:1px;background:var(--border);margin:8px 8px}

/* FILTERS */
.filter-section{padding:12px 8px;margin-top:auto;border-top:1px solid var(--border)}
.filter-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:0 4px 8px}
.filter-sel{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;padding:6px 8px;border-radius:6px;margin-bottom:6px;font-family:"IBM Plex Sans",sans-serif}
.btn-clear{width:100%;background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:11px;padding:6px;border-radius:6px;cursor:pointer;margin-top:2px;font-family:"IBM Plex Sans",sans-serif}
.btn-clear:hover{background:var(--bg3)}

/* MAIN */
.main{flex:1;padding:24px;overflow-x:hidden;min-width:0}
.section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.kpi-accent{height:3px}
.kpi-body{padding:14px 16px 16px}
.kpi-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:600;font-family:"IBM Plex Mono",monospace;color:var(--text);line-height:1}
.kpi-sub{font-size:9px;font-family:"IBM Plex Mono",monospace;color:var(--text3);margin-top:4px}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chart-title{font-size:12px;font-weight:600;color:var(--text2)}
.chart-wrap{position:relative;height:160px}
.chart-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* LINE CARDS */
.line-section{margin-bottom:20px}
.line-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.line-filters{display:flex;gap:6px;flex-wrap:wrap}
.line-sel-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:"IBM Plex Sans",sans-serif;transition:all .15s}
.line-sel-btn.active{background:var(--accent-lt);color:var(--text);border-color:var(--accent)}
.line-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.line-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow);overflow:hidden}
.line-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.line-ind-name{font-size:11px;font-weight:500;color:var(--text);line-height:1.3;flex:1;margin-right:8px}
.status-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.line-value-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.line-value{font-size:20px;font-weight:600;font-family:"IBM Plex Mono",monospace;color:var(--text)}
.line-meta-chip{font-size:10px;font-family:"IBM Plex Mono",monospace;padding:2px 7px;border-radius:8px;background:var(--bg4);color:var(--text3)}
.line-chart-wrap{height:70px;margin-bottom:8px}
.line-footer{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:8px}
.lf-col{flex:1;text-align:center}
.lf-label{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.lf-val{font-size:10px;font-family:"IBM Plex Mono",monospace;color:var(--text2);margin-top:2px}
.line-pagination{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:12px}
.page-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:"IBM Plex Sans",sans-serif}
.page-btn:hover{background:var(--bg4)}
.page-info{font-size:11px;font-family:"IBM Plex Mono",monospace;color:var(--text3)}

/* TABLE */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.table-title{font-size:13px;font-weight:600;color:var(--text)}
.table-count{font-size:11px;font-family:"IBM Plex Mono",monospace;color:var(--text3);background:var(--bg4);padding:2px 8px;border-radius:8px}
.search-box{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;padding:6px 12px;border-radius:8px;font-family:"IBM Plex Sans",sans-serif;width:200px}
.search-box::placeholder{color:var(--text3)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;background:var(--bg2)}
th:hover{color:var(--text2)}
td{font-size:12px;color:var(--text2);padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
tr.risk-row td{border-left:none}
tr.risk-row td:first-child{border-left:3px solid #FF5C6A;padding-left:11px}
.dir-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap}
.nivel-badge{font-size:9px;padding:2px 7px;border-radius:8px;background:var(--bg4);color:var(--text3)}
.prog-bar-wrap{width:80px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-bar{height:100%;border-radius:2px}
.table-footer{padding:10px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-family:"IBM Plex Mono",monospace}
em.hl{background:rgba(79,142,255,0.2);color:var(--text);font-style:normal;border-radius:2px;padding:0 1px}

/* MAPA */
.mapa-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.mapa-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mapa-img-wrap{background:var(--bg3);padding:20px;display:flex;justify-content:center}
.mapa-img-wrap img{max-width:100%;border-radius:8px}

/* PLANO */
.plano-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.prog-global-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
.prog-global-bar{height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;margin-top:8px}
.prog-global-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#6C3FFF,#4F8EFF,#20C0FF,#00C8A0)}

/* ── Timesheet dropdown filters ──────────────────────────── */
.ts-dd-wrap{position:relative}
.ts-dd-btn{
  display:flex;align-items:center;gap:6px;
  height:32px;padding:0 11px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:7px;cursor:pointer;
  font-size:12px;font-family:"IBM Plex Sans",sans-serif;color:var(--text2);
  white-space:nowrap;transition:border-color .15s,background .15s
}
.ts-dd-btn:hover{background:var(--bg4);border-color:var(--border2)}
.ts-dd-btn.ts-dd-active{border-color:var(--accent);background:var(--accent-lt)}
.ts-dd-btn.ts-dd-has-val{border-color:#4F8EFF88;color:var(--text);background:rgba(79,142,255,.08)}
.ts-dd-arrow{font-size:9px;color:var(--text3);transition:transform .15s}
.ts-dd-btn.ts-dd-active .ts-dd-arrow{transform:rotate(180deg)}
.ts-dd-label{max-width:120px;overflow:hidden;text-overflow:ellipsis}
.ts-dd-menu{
  display:none;position:absolute;top:calc(100% + 5px);left:0;z-index:200;
  background:var(--bg2);border:1px solid var(--border2);border-radius:9px;
  padding:5px 0;min-width:170px;max-height:260px;overflow-y:auto;
  box-shadow:0 8px 28px rgba(0,0,0,.35);
}
.ts-dd-menu.ts-dd-open{display:block}
.ts-dd-wide{min-width:240px}
.ts-dd-search{
  display:block;width:calc(100% - 16px);margin:6px 8px 4px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;padding:5px 9px;font-size:11px;
  color:var(--text);font-family:"IBM Plex Sans",sans-serif;
}
.ts-dd-search::placeholder{color:var(--text3)}
.ts-dd-item{
  display:flex;align-items:center;padding:7px 13px;
  font-size:12px;color:var(--text2);cursor:pointer;
  transition:background .1s;user-select:none;gap:6px
}
.ts-dd-item:hover{background:var(--bg3);color:var(--text)}
.ts-dd-item.ts-dd-selected{
  color:var(--text);font-weight:500;
  background:var(--accent-lt)
}
.ts-dd-item.ts-dd-selected::after{
  content:'✓';margin-left:auto;font-size:11px;
  color:#4F8EFF;font-weight:700;padding-left:8px
}
/* FOOTER */
.footer{background:var(--bg2);border-top:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 24px;flex-shrink:0}
.footer-col{flex:1;font-size:11px;color:var(--text3)}
.footer-col.center{text-align:center}
.footer-col.right{text-align:right}
</style>
</head>

function fmt(v, ind) {
  if (v === null || v === undefined) return '—';
  if (typeof v === 'number') {
    if (ind && (ind.includes('%') || ind.includes('Conversão') || ind.includes('inadimpl') || ind.includes('Orçado') || ind.includes('CA') || ind.includes('Desp') || ind.includes('Turnover') || ind.includes('Absen'))) {
      return (v*100).toFixed(1)+'%';
    }
    if (v >= 1000000) return 'R$ '+(v/1000000).toFixed(1)+'M';
    if (v >= 1000) return v.toLocaleString('pt-BR');
    return v.toString();
  }
  return v;
}
function getStatus(r) {
  if (r.risk) return 'risk';
  const hasData = r.jan!==null||r.fev!==null||r.mar!==null||r.abr!==null;
  if (!hasData) return 'nd';
  if (r.ok===true) return 'ok';
  if (r.ok===false) return 'warn';
  return 'nd';
}
function statusInfo(s) {
  const m = {
    ok:   {emoji:'✅',label:'No Alvo',   color:'#00C8A0',bg:'rgba(0,200,160,.15)'},
    risk: {emoji:'🔴',label:'Em Risco',  color:'#FF5C6A',bg:'rgba(255,92,106,.15)'},
    warn: {emoji:'🟡',label:'Atenção',   color:'#FF9B00',bg:'rgba(255,155,0,.15)'},
    nd:   {emoji:'⚪',label:'Sem Dados', color:'#8890B0',bg:'var(--bg4)'}
  };
  return m[s]||m.nd;
}
function getAccum(r) {
  const vals = [r.jan,r.fev,r.mar,r.abr].filter(v=>v!==null&&v!==undefined);
  return vals.length ? vals[vals.length-1] : null;
}
function highlight(txt, q) {
  if (!q) return txt;
  const safe = q.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
  const re = new RegExp('(' + safe + ')', 'gi');
  return txt.replace(re,'<em class="hl">$1</em>');
}

function filtered() {
  return DB.filter(r => {
    if (S.setor !== 'Geral' && r.setor !== S.setor) return false;
    if (S.persp && r.persp !== S.persp) return false;
    if (S.nivel && r.nivel !== S.nivel) return false;
    if (S.status && getStatus(r) !== S.status) return false;
    if (S.q && !r.ind.toLowerCase().includes(S.q.toLowerCase())) return false;
    return true;
  });
}

// ── Gradient helpers ──────────────────────────────────────────────────
function mkLinearV(ctx, h, c1, c2) {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, c1); g.addColorStop(1, c2); return g;
}
function mkLinearH(ctx, w, c1, c2) {
  const g = ctx.createLinearGradient(0, 0, w, 0);
  g.addColorStop(0, c1); g.addColorStop(1, c2); return g;
}
// Radial gradient for donut arcs — centre of canvas
function mkRadial(ctx, w, h, r0, r1, c1, c2) {
  const g = ctx.createRadialGradient(w/2,h/2,r0, w/2,h/2,r1);
  g.addColorStop(0, c1); g.addColorStop(1, c2); return g;
}
// Convert solid hex/rgb to translucent version
function alpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

    const w4 = b2.offsetWidth||300;
    const riskGrads = riskBySetor.map((_,i)=>{
      const ratio = i/Math.max(setores.length-1,1);
      const g = ctx4.createLinearGradient(0,0,w4,0);
      g.addColorStop(0, '#FF8090CC'); g.addColorStop(1, '#FF9B0066'); return g;
    });
    activeCharts.b2 = new Chart(b2, {
      type:'bar',
      data:{
        labels:setores,
        datasets:[{
          data:riskBySetor,
          backgroundColor:riskGrads,
          borderColor:'#FF5C6A44',
          borderWidth:1,
          borderRadius:6,
          borderSkipped:false,
          maxBarThickness:28
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false, indexAxis:'y',
        plugins:{legend:{display:false},datalabels:{color:'#fff',font:{size:11,weight:'600'},anchor:'end',align:'end'}},
        scales:{x:{display:false,beginAtZero:true},y:{grid:{display:false},ticks:{color:'#9096B0',font:{size:11}}}}
      }
    });
  }
}

function buildLineSection(rows) {
  const setores = ['Todos', ...new Set(rows.map(r=>r.setor))];
  const filtersEl = document.getElementById('lineFilters');
  if (filtersEl) {
    filtersEl.innerHTML = setores.map(s =>
      '<button class="line-sel-btn'+(lineSectorFilter===s?' active':'')+'" data-ls="'+s+'" onclick="setLineSector(this.dataset.ls)">'+s+'</button>'
    ).join('');
  }
  const cands = lineSectorFilter==='Todos' ? rows : rows.filter(r=>r.setor===lineSectorFilter);
  renderLineCards(cands);
}

function renderLineCards(cands) {
  Object.values(LINE_CHARTS).forEach(c=>{if(c&&!c.destroyed)c.destroy()});
  const grid = document.getElementById('lineGrid');
  const pagEl = document.getElementById('linePag');
  if (!grid) return;
  const page = cands.slice(linePageStart, linePageStart+6);
  const totalPages = Math.ceil(cands.length/6);
  const curPage = Math.floor(linePageStart/6)+1;

  grid.innerHTML = page.map((r,i) => {
    const s = getStatus(r);
    const si = statusInfo(s);
    const acum = getAccum(r);
    return '<div class="line-card" style="border-top:3px solid '+si.color+'">' +
      '<div class="line-card-top"><span class="line-ind-name">'+r.ind+'</span>' +
      '<span class="status-badge" style="background:'+si.bg+';color:'+si.color+'">'+si.label+'</span></div>' +
      '<div class="line-value-row"><span class="line-value mono">'+fmt(acum,r.ind)+'</span>' +
      (r.meta?'<span class="line-meta-chip mono">Meta: '+r.meta+'</span>':'')+'</div>' +
      '<div class="line-chart-wrap"><canvas id="lc'+i+'"></canvas></div>' +
      '<div class="line-footer">' +
        '<div class="lf-col"><div class="lf-label">Jan</div><div class="lf-val mono">'+fmt(r.jan,r.ind)+'</div></div>' +
        '<div class="lf-col"><div class="lf-label">Fev</div><div class="lf-val mono">'+fmt(r.fev,r.ind)+'</div></div>' +
        '<div class="lf-col"><div class="lf-label">Mar</div><div class="lf-val mono">'+fmt(r.mar,r.ind)+'</div></div>' +
        '<div class="lf-col"><div class="lf-label">Abr</div><div class="lf-val mono">'+fmt(r.abr,r.ind)+'</div></div>' +
      '</div></div>';
  }).join('');

  page.forEach((r,i) => {
    const canvas = document.getElementById('lc'+i);
    if (!canvas) return;
    const existing = Chart.getChart(canvas);
    if (existing) existing.destroy();
    const vals = [r.jan,r.fev,r.mar,r.abr];
    const s = getStatus(r);
    const si = statusInfo(s);
    LINE_CHARTS['lc'+i] = new Chart(canvas, {
      type:'line',
      data:{
        labels:['Jan','Fev','Mar','Abr'],
        datasets:[{
          data:vals, fill:true,
          borderColor:si.color,
          borderWidth:2,
          pointRadius:3,
          pointBackgroundColor:si.color,
          pointBorderColor:'transparent',
          backgroundColor: function(context) {
            const chart = context.chart;
            const {ctx: c, chartArea} = chart;
            if (!chartArea) return 'transparent';
            const g = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
            g.addColorStop(0, si.color + 'AA');
            g.addColorStop(0.6, si.color + '33');
            g.addColorStop(1, si.color + '00');
            return g;
          },
          tension:.4
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:false}},scales:{x:{display:false},y:{display:false}}}
    });
  });

  if (pagEl) {
    pagEl.innerHTML = totalPages>1
      ? '<button class="page-btn" onclick="linePage(-1)">← Anterior</button>' +
        '<span class="page-info mono">'+curPage+' / '+totalPages+'</span>' +
        '<button class="page-btn" onclick="linePage(1)">Próximo →</button>'
      : '';
  }
}

function buildTable(rows) {
  const sorted = [...rows].sort((a,b)=>{
    let va=a[S.col]||'', vb=b[S.col]||'';
    if (S.col==='status') { va=getStatus(a); vb=getStatus(b); }
    if (typeof va==='string') return va.localeCompare(vb)*S.sortDir;
    return (va-vb)*S.sortDir;
  });
  const tbody = document.getElementById('tblBody');
  const count = document.getElementById('tblCount');
  const footer = document.getElementById('tblFooter');
  if (!tbody) return;
  tbody.innerHTML = sorted.map(r => {
    const s = getStatus(r);
    const si = statusInfo(s);
    const color = SETOR_COLORS[r.setor]||'#6C3FFF';
    const acum = getAccum(r);
    return '<tr class="'+(s==='risk'?'risk-row':'')+'">' +
      '<td style="font-size:14px">'+si.emoji+'</td>' +
      '<td>'+highlight(r.ind, S.q)+'</td>' +
      '<td><span class="dir-badge" style="background:'+color+'22;color:'+color+'">'+r.setor+'</span></td>' +
      '<td><span class="nivel-badge">'+r.nivel+'</span></td>' +
      '<td class="mono" style="font-size:11px">'+r.meta+'</td>' +
      '<td class="mono">'+fmt(r.jan,r.ind)+'</td>' +
      '<td class="mono">'+fmt(r.fev,r.ind)+'</td>' +
      '<td class="mono">'+fmt(r.mar,r.ind)+'</td>' +
      '<td class="mono">'+fmt(r.abr,r.ind)+'</td>' +
      '<td><span class="status-badge" style="background:'+si.bg+';color:'+si.color+'">'+si.label+'</span></td>' +
    '</tr>';
  }).join('');
  if (count) count.textContent = sorted.length + ' indicadores';
  if (footer) footer.textContent = 'Exibindo ' + sorted.length + ' de ' + DB.length + ' indicadores';
}

function buildBscMapHtml() {
  const stColors = {
    'Concluído':    '#00C8A0',
    'Em andamento': '#4F8EFF',
    'Em atraso':    '#FF5C6A',
    'Não iniciado': '#8890B0'
  };

  return BSC_CONFIG.map(persp => {
    const perspAcoes = PLANO_DB.filter(a => a.bsc === persp.key);
    const total = perspAcoes.length;
    const concl = perspAcoes.filter(a => a.status === 'Concluído').length;
    const andamento = perspAcoes.filter(a => a.status === 'Em andamento').length;
    const atraso = perspAcoes.filter(a => a.status === 'Em atraso').length;
    const naoIniciado = perspAcoes.filter(a => a.status === 'Não iniciado').length;
    const pct = total > 0 ? Math.round((concl / total) * 100) : 0;
    const c = persp.color;
    const cAlpha = c + '22';
    const cAlpha2 = c + '15';

    // Status pills
    const pills = [
      {label: concl + ' concluídas', color: '#00C8A0', show: concl > 0},
      {label: andamento + ' em andamento', color: '#4F8EFF', show: andamento > 0},
      {label: atraso + ' em atraso', color: '#FF5C6A', show: atraso > 0},
      {label: naoIniciado + ' não iniciadas', color: '#8890B0', show: naoIniciado > 0}
    ].filter(p => p.show);

    const pillsHtml = pills.map(p =>
      '<span style="font-size:9px;font-family:IBM Plex Mono,monospace;padding:2px 7px;border-radius:10px;' +
      'background:' + p.color + '22;color:' + p.color + ';white-space:nowrap">' + p.label + '</span>'
    ).join('');

    // Objectives rows
    const objHtml = persp.objetivos.map(obj => {
      const objAcoes = perspAcoes.filter(a => a.objetivo && a.objetivo.toLowerCase().includes(obj.split(' ').slice(0,3).join(' ').toLowerCase()));
      const objTotal = Math.max(objAcoes.length, 1);
      const objConcl = objAcoes.filter(a => a.status === 'Concluído').length;
      const objPct = Math.round((objConcl / objTotal) * 100);
      const barW = Math.max(objPct, 3);

      return '<div style="margin-bottom:10px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">' +
          '<span style="font-size:11px;color:var(--text2);flex:1;padding-right:12px;line-height:1.35">' + obj + '</span>' +
          '<span style="font-size:12px;font-weight:600;font-family:IBM Plex Mono,monospace;color:' + c + ';white-space:nowrap">' + objPct + '%</span>' +
        '</div>' +
        '<div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;position:relative">' +
          '<div style="position:absolute;inset:0;width:' + barW + '%;border-radius:3px;' +
            'background:linear-gradient(90deg,' + c + 'FF,' + c + '88)"></div>' +
        '</div>' +
        '<div style="font-size:9px;color:var(--text3);margin-top:3px;font-family:IBM Plex Mono,monospace">' +
          objConcl + ' / ' + objTotal + ' ações concluídas' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div class="bsc-row" style="' +
      'display:flex;align-items:stretch;border-radius:14px;overflow:hidden;' +
      'background:var(--bg2);border:1px solid ' + c + '33;' +
      'box-shadow:0 2px 12px ' + c + '18,0 1px 3px rgba(0,0,0,.12);' +
      'margin-bottom:12px;transition:box-shadow .2s' +
    '">' +
      // Left icon panel
      '<div style="' +
        'width:72px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;' +
        'background:linear-gradient(160deg,' + c + 'CC,' + c + '55);' +
        'padding:16px 8px;gap:6px' +
      '">' +
        '<div style="font-size:26px;line-height:1">' + persp.icon + '</div>' +
        '<div style="font-size:9px;font-weight:600;color:#fff;text-align:center;text-transform:uppercase;letter-spacing:.6px;line-height:1.3">' + persp.label + '</div>' +
      '</div>' +
      // Center: objectives
      '<div style="flex:1;padding:16px 18px;border-right:1px solid ' + c + '22">' +
        '<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px">Objetivos Estratégicos</div>' +
        objHtml +
      '</div>' +
      // Right: summary stats
      '<div style="width:168px;flex-shrink:0;padding:16px 14px;display:flex;flex-direction:column;justify-content:center;gap:10px">' +
        // Big % circle area
        '<div style="text-align:center">' +
          '<div style="font-size:36px;font-weight:700;font-family:IBM Plex Mono,monospace;' +
            'background:linear-gradient(135deg,' + c + ',' + c + '99);' +
            '-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1">' + pct + '%</div>' +
          '<div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px">progresso</div>' +
        '</div>' +
        // Progress bar
        '<div style="height:5px;background:var(--bg4);border-radius:3px;overflow:hidden">' +
          '<div style="width:' + Math.max(pct,3) + '%;height:100%;border-radius:3px;' +
            'background:linear-gradient(90deg,' + c + 'EE,' + c + '66)"></div>' +
        '</div>' +
        // Total count
        '<div style="text-align:center;padding:6px 0 2px">' +
          '<div style="font-size:20px;font-weight:700;font-family:IBM Plex Mono,monospace;color:var(--text)">' + total + '</div>' +
          '<div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">ações</div>' +
        '</div>' +
        // Pills
        '<div style="display:flex;flex-direction:column;gap:4px">' + pillsHtml + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

      '</tr></thead>' +
      '<tbody id="planoTbody"></tbody></table>' +
      '<div class="table-footer" id="planoFooter"></div>' +
    '</div>';

  renderPlanoTable();
}

function kpiMini(label, val, grad) {
  return '<div class="kpi-card"><div class="kpi-accent" style="background:'+grad+'"></div>' +
    '<div class="kpi-body"><div class="kpi-label">'+label+'</div>' +
    '<div class="kpi-value mono">'+val+'</div></div></div>';
}

function renderPlanoTable() {
  let data = PLANO_DB.filter(a=>{
    if (pFilterStatus && a.status !== pFilterStatus) return false;
    if (pFilterBsc && a.bsc !== pFilterBsc) return false;
    if (pSearch && !a.atividade.toLowerCase().includes(pSearch.toLowerCase())) return false;
    return true;
  });
  data = [...data].sort((a,b)=>{
    let va=a[pSortCol]||'', vb=b[pSortCol]||'';
    if (typeof va==='string') return va.localeCompare(vb)*pSortDir;
    return (va-vb)*pSortDir;
  });

  const stColors = {
    'Concluído':    {color:'#00C8A0',bg:'rgba(0,200,160,.15)'},
    'Em andamento': {color:'#4F8EFF',bg:'rgba(79,142,255,.15)'},
    'Em atraso':    {color:'#FF5C6A',bg:'rgba(255,92,106,.15)'},
    'Não iniciado': {color:'#8890B0',bg:'var(--bg4)'},
  };
  const prioColors = {'Alta':'#FF5C6A','Normal':'#8890B0'};
  const tbody = document.getElementById('planoTbody');
  const count = document.getElementById('pCount');
  const footer = document.getElementById('planoFooter');
  if (!tbody) return;

  tbody.innerHTML = data.map(a=>{
    const sc = stColors[a.status]||stColors['Não iniciado'];
    const bscColor = Object.values(PERSP_COLORS)[Object.keys(PERSP_COLORS).findIndex(k=>k===a.bsc)] || '#6C3FFF';
    const isAtraso = a.dias_atraso > 0;
    return '<tr class="'+(isAtraso?'risk-row':'')+'">' +
      '<td><span class="status-badge" style="background:'+sc.bg+';color:'+sc.color+'">'+a.status+'</span></td>' +
      '<td style="max-width:280px">'+highlight(a.atividade, pSearch)+'</td>' +
      '<td><span class="dir-badge" style="background:'+bscColor+'22;color:'+bscColor+';font-size:9px">'+a.bsc.replace(/^\d+\. /,'')+'</span></td>' +
      '<td style="font-size:11px;color:var(--text3)">'+a.responsavel+'</td>' +
      '<td class="mono" style="font-size:11px">'+a.prazo+'</td>' +
      '<td><span class="status-badge" style="background:'+(a.prioridade==='Alta'?'rgba(255,92,106,.15)':'var(--bg4)')+';color:'+(prioColors[a.prioridade]||'#8890B0')+'">'+a.prioridade+'</span></td>' +
      '<td class="mono" style="font-size:11px;color:'+(a.dias_atraso>0?'#FF5C6A':'var(--text3)')+'">'+
        (a.dias_atraso>0?'+'+a.dias_atraso+'d':'—')+'</td>' +
    '</tr>';
  }).join('');
  if (count) count.textContent = data.length + ' ações';
  if (footer) footer.textContent = 'Exibindo '+data.length+' de '+PLANO_DB.length+' ações';
}

const TS_ALL_COLABS   = [...new Set(TS_RAW.map(r=>r.c))].sort();
const TS_ALL_ANOS     = [...new Set(TS_RAW.map(r=>r.a))].sort();
const TS_ALL_MESES    = [...new Set(TS_RAW.map(r=>r.m))].sort((a,b)=>(MES_ORD[a]||9)-(MES_ORD[b]||9));
const TS_ALL_CATS     = [...new Set(TS_RAW.map(r=>r.cat))].filter(Boolean).sort();
const TS_ALL_CLIENTES = [...new Set(TS_RAW.filter(r=>r.b).map(r=>r.cl))]
  .filter(Boolean)
  .sort((a,b)=>{
    const ha = TS_RAW.filter(r=>r.cl===a).reduce((s,r)=>s+r.h,0);
    const hb = TS_RAW.filter(r=>r.cl===b).reduce((s,r)=>s+r.h,0);
    return hb-ha;
  });

// ── Filter engine ────────────────────────────────────────────────────
function tsFiltered() {
  return TS_RAW.filter(r=>{
    if (TSF.colabs.length   && !TSF.colabs.includes(r.c))   return false;
    if (TSF.anos.length     && !TSF.anos.includes(r.a))     return false;
    if (TSF.meses.length    && !TSF.meses.includes(r.m))    return false;
    if (TSF.cats.length     && !TSF.cats.includes(r.cat))   return false;
    if (TSF.clientes.length && !TSF.clientes.includes(r.cl)) return false;
    if (TSF.tipo === 'billable'    && !r.b)  return false;
    if (TSF.tipo === 'nonbillable' &&  r.b)  return false;
    return true;
  });
}

function tsActiveFiltersCount() {
  return TSF.colabs.length+TSF.anos.length+TSF.meses.length+TSF.cats.length+TSF.clientes.length+(TSF.tipo!=='todos'?1:0);
}

// ── KPIs ─────────────────────────────────────────────────────────────
function tsKpiCard(label,val,sub,grad) {
  return '<div class="kpi-card"><div class="kpi-accent" style="background:'+grad+'"></div>' +
    '<div class="kpi-body"><div class="kpi-label">'+label+'</div>' +
    '<div class="kpi-value mono">'+val+'</div>' +
    '<div class="kpi-sub mono">'+sub+'</div></div></div>';
}

function tsRenderKpis(rows) {
  const kpisEl = document.getElementById('tsKpis');
  if (!kpisEl) return;
  const totalHrs = rows.reduce((a,r)=>a+r.h,0);
  const billHrs  = rows.filter(r=>r.b).reduce((a,r)=>a+r.h,0);
  const nonBill  = rows.filter(r=>!r.b).reduce((a,r)=>a+r.h,0);
  const teamCharg = totalHrs>0 ? Math.round(billHrs/totalHrs*100) : 0;
  const colabs = [...new Set(rows.map(r=>r.c))];
  const colabChargs = colabs.map(c=>{
    const cr = rows.filter(r=>r.c===c);
    const t  = cr.reduce((a,r)=>a+r.h,0);
    const b  = cr.filter(r=>r.b).reduce((a,r)=>a+r.h,0);
    return t>0 ? b/t*100 : 0;
  });
  const acima  = colabChargs.filter(v=>v>=CHARGE_TARGET).length;
  const abaixo = colabChargs.filter(v=>v<CHARGE_TARGET).length;
  const regStr = rows.length.toLocaleString('pt-BR');
  kpisEl.innerHTML =
    tsKpiCard('Horas Totais',   Math.round(totalHrs)+'h',  regStr+' registros',     'linear-gradient(90deg,#6C3FFF,#4F8EFF)') +
    tsKpiCard('Horas Billable', Math.round(billHrs)+'h',   'em clientes/projetos',  'linear-gradient(90deg,#00D4A0,#20C0FF)') +
    tsKpiCard('Non-Billable',   Math.round(nonBill)+'h',   'internas ITP',          'linear-gradient(90deg,#FF5C6A,#FF8C00)') +
    tsKpiCard('Chargeability',  teamCharg+'%',              'média filtrada',         teamCharg>=CHARGE_TARGET?'linear-gradient(90deg,#00D4A0,#20C0FF)':'linear-gradient(90deg,#FF5C6A,#FF8C00)') +
    tsKpiCard('Meta ≥'+CHARGE_TARGET+'%', acima+' ✅ / '+abaixo+' 🔴', 'acima / abaixo da meta','linear-gradient(90deg,#6C3FFF,#FF40A0)');
}

// ── Charts ────────────────────────────────────────────────────────────
function tsInitCharts(rows) {
  // Shared destroyer helper
  function destroyCanvas(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    const ex = Chart.getChart(el); if (ex) ex.destroy();
    return el;
  }

  const colabs = [...new Set(rows.map(r=>r.c))].sort();

  // ── 1. Chargeability per colab bar ─────────────────────────────
  const bc = destroyCanvas('tsChargBar');
  if (bc) {
    const ctx = bc.getContext('2d');
    const h = bc.offsetHeight||200;
    const vals = colabs.map(c=>{
      const cr=rows.filter(r=>r.c===c);
      const t=cr.reduce((a,r)=>a+r.h,0);
      const b=cr.filter(r=>r.b).reduce((a,r)=>a+r.h,0);
      return t>0 ? Math.round(b/t*100) : 0;
    });
    const grads = vals.map(v=>{
      const g=ctx.createLinearGradient(0,0,0,h);
      const col=v>=CHARGE_TARGET?'#00C8A0':v>=50?'#FF9B00':'#FF5C6A';
      g.addColorStop(0,col+'EE'); g.addColorStop(1,col+'33'); return g;
    });
    tsCharts.chargBar = new Chart(bc,{
      type:'bar',
      data:{labels:colabs.map(c=>c.split(' ')[0]),
        datasets:[{data:vals,backgroundColor:grads,borderWidth:0,borderRadius:8,borderSkipped:false,maxBarThickness:52}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},datalabels:{color:'#fff',font:{size:11,weight:'600'},formatter:v=>v+'%',anchor:'end',align:'start'}},
        scales:{x:{grid:{display:false},ticks:{color:'#9096B0',font:{size:11}}},
          y:{beginAtZero:true,max:100,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#9096B0',font:{size:10},callback:v=>v+'%'}}}},
      plugins:[{id:'tl',afterDraw(chart){
        const {ctx:c,chartArea,scales:{y}}=chart;
        const yPos=y.getPixelForValue(CHARGE_TARGET);
        c.save(); c.strokeStyle='#FF9B00CC'; c.lineWidth=1.5; c.setLineDash([6,4]);
        c.beginPath(); c.moveTo(chartArea.left,yPos); c.lineTo(chartArea.right,yPos); c.stroke();
        c.fillStyle='#FF9B00'; c.font='bold 10px IBM Plex Mono,monospace';
        c.fillText('Meta '+CHARGE_TARGET+'%',chartArea.right-72,yPos-5); c.restore();
      }}]
    });
  }

  // ── 2. Donut Billable/Non-Bill ──────────────────────────────────
  const dc = destroyCanvas('tsDonutBill');
  if (dc) {
    const ctx3=dc.getContext('2d'); const w3=dc.offsetWidth||220,h3=dc.offsetHeight||170;
    const bill=rows.filter(r=>r.b).reduce((a,r)=>a+r.h,0);
    const nonB=rows.filter(r=>!r.b).reduce((a,r)=>a+r.h,0);
    const gB=ctx3.createRadialGradient(w3/2,h3/2,h3*.15,w3/2,h3/2,h3*.5);
    gB.addColorStop(0,'#00FFD0CC'); gB.addColorStop(1,'#00C8A055');
    const gN=ctx3.createRadialGradient(w3/2,h3/2,h3*.15,w3/2,h3/2,h3*.5);
    gN.addColorStop(0,'#FF5C6ACC'); gN.addColorStop(1,'#FF9B0055');
    tsCharts.donut = new Chart(dc,{type:'doughnut',
      data:{labels:['Billable','Non-Billable'],datasets:[{data:[Math.round(bill),Math.round(nonB)],backgroundColor:[gB,gN],borderWidth:0,cutout:'65%',hoverOffset:5}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{color:'#fff',font:{size:10,weight:'600'},formatter:(v,ctx)=>{const tot=ctx.dataset.data.reduce((a,b)=>a+b,0);return tot>0?Math.round(v/tot*100)+'%':'0%';}}}}
    });
    const leg=document.getElementById('tsDonutLeg');
    if(leg) leg.innerHTML='<div class="chart-legend">' +
      '<div class="legend-item"><div class="legend-dot" style="background:#00C8A0"></div>Billable ('+Math.round(bill)+'h)</div>' +
      '<div class="legend-item"><div class="legend-dot" style="background:#FF5C6A"></div>Non-Bill. ('+Math.round(nonB)+'h)</div>' +
      '</div>';
  }

  // ── 3. Monthly chargeability line ──────────────────────────────
  const tlc = destroyCanvas('tsTeamLine');
  if (tlc) {
    const ctx2=tlc.getContext('2d'); const h2=tlc.offsetHeight||180;
    const anos  = [...new Set(rows.map(r=>r.a))].sort();
    const LINE_COLS = ['#4F8EFF','#00C8A0','#FF9B00','#FF40A0'];
    const datasets = anos.map((ano,i)=>{
      const col=LINE_COLS[i%LINE_COLS.length];
      const g=ctx2.createLinearGradient(0,0,0,h2);
      g.addColorStop(0,col+'55'); g.addColorStop(1,col+'00');
      const data = MES_LABELS.map(mes=>{
        const mr=rows.filter(r=>r.a===ano&&r.m===mes);
        const t=mr.reduce((a,r)=>a+r.h,0);
        const b=mr.filter(r=>r.b).reduce((a,r)=>a+r.h,0);
        return t>0 ? Math.round(b/t*100) : null;
      });
      return {label:String(ano),data,borderColor:col,borderWidth:2,pointRadius:4,
        pointBackgroundColor:col,pointBorderColor:'transparent',
        backgroundColor:g,fill:true,tension:.4,spanGaps:true};
    });
    tsCharts.teamLine = new Chart(tlc,{type:'line',data:{labels:['Jan','Fev','Mar','Abr'],datasets},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#9096B0',font:{size:10},boxWidth:10}},datalabels:{display:false}},
        scales:{x:{grid:{display:false},ticks:{color:'#9096B0',font:{size:11}}},
          y:{beginAtZero:true,max:100,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#9096B0',font:{size:10},callback:v=>v+'%'}}}}});
  }

  // ── 4. Category bar ────────────────────────────────────────────
  const catc = destroyCanvas('tsCatBar');
  if (catc) {
    const ctx4=catc.getContext('2d'); const h4=catc.offsetHeight||180;
    const catTotals = TS_ALL_CATS.map(cat=>({cat,h:rows.filter(r=>r.cat===cat).reduce((a,r)=>a+r.h,0)}))
      .filter(x=>x.h>0).sort((a,b)=>b.h-a.h);
    const grads=catTotals.map(({cat})=>{
      const col=TS_CAT_COLORS[cat]||'#6C3FFF';
      const g=ctx4.createLinearGradient(0,0,0,h4);
      g.addColorStop(0,col+'EE'); g.addColorStop(1,col+'44'); return g;
    });
    tsCharts.catBar = new Chart(catc,{type:'bar',
      data:{labels:catTotals.map(x=>x.cat.replace(/^\d+\. /,'')),
        datasets:[{data:catTotals.map(x=>Math.round(x.h)),backgroundColor:grads,borderRadius:6,borderSkipped:false,maxBarThickness:48}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:false},datalabels:{color:'#fff',font:{size:10,weight:'600'},anchor:'end',align:'end',formatter:v=>v+'h'}},
        scales:{x:{display:false,beginAtZero:true},y:{grid:{display:false},ticks:{color:'#9096B0',font:{size:10}}}}}
    });
  }

  // ── 5. Top clients bar ─────────────────────────────────────────
  const clic = destroyCanvas('tsCliBar');
  if (clic) {
    const ctx5=clic.getContext('2d'); const h5=clic.offsetHeight||180;
    const cliTotals = {};
    rows.filter(r=>r.b).forEach(r=>{cliTotals[r.cl]=(cliTotals[r.cl]||0)+r.h;});
    const top10 = Object.entries(cliTotals).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const g=ctx5.createLinearGradient(0,0,h5*2,0);
    g.addColorStop(0,'#20C0FFEE'); g.addColorStop(1,'#4F8EFF55');
    tsCharts.cliBar = new Chart(clic,{type:'bar',
      data:{labels:top10.map(([c])=>c.replace(/^\d+\.\s*/,'').slice(0,10)),
        datasets:[{data:top10.map(([,h])=>Math.round(h)),backgroundColor:g,borderRadius:6,borderSkipped:false,maxBarThickness:28}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:false},datalabels:{color:'#fff',font:{size:9,weight:'600'},anchor:'end',align:'end',formatter:v=>v+'h'}},
        scales:{x:{display:false,beginAtZero:true},y:{grid:{display:false},ticks:{color:'#9096B0',font:{size:9}}}}}
    });
  }
}

// ── Colab cards ────────────────────────────────────────────────────────
function tsRenderColabCards(rows) {
  const grid = document.getElementById('tsColabGrid');
  if (!grid) return;
  const colabs = [...new Set(rows.map(r=>r.c))].sort();
  if (!colabs.length) { grid.innerHTML='<div style="color:var(--text3);font-size:13px;padding:20px">Nenhum dado para os filtros selecionados.</div>'; return; }
  grid.innerHTML = colabs.map((colab,idx)=>{
    const cr   = rows.filter(r=>r.c===colab);
    const tot  = cr.reduce((a,r)=>a+r.h,0);
    const bill = cr.filter(r=>r.b).reduce((a,r)=>a+r.h,0);
    const nonb = cr.filter(r=>!r.b).reduce((a,r)=>a+r.h,0);
    const charg= tot>0 ? Math.round(bill/tot*100) : 0;
    const col  = charg>=CHARGE_TARGET?'#00C8A0':charg>=50?'#FF9B00':'#FF5C6A';
    const bg   = charg>=CHARGE_TARGET?'rgba(0,200,160,.10)':charg>=50?'rgba(255,155,0,.10)':'rgba(255,92,106,.10)';
    const label= charg>=CHARGE_TARGET?'✅ Meta atingida':charg>=50?'🟡 Atenção':'🔴 Abaixo da meta';

    // Monthly per ano breakdown
    const anosColab=[...new Set(cr.map(r=>r.a))].sort();
    const dotsHtml = MES_LABELS.map((mes,i)=>{
      const mr=cr.filter(r=>r.m===mes);
      const t=mr.reduce((a,r)=>a+r.h,0);
      const b=mr.filter(r=>r.b).reduce((a,r)=>a+r.h,0);
      const v=t>0?Math.round(b/t*100):null;
      const dc=v===null?'#6E748A':v>=CHARGE_TARGET?'#00C8A0':v>=50?'#FF9B00':'#FF5C6A';
      const label=['J','F','M','A'][i];
      return '<div style="display:flex;flex-direction:column;align-items:center;gap:3px">' +
        '<div style="font-family:IBM Plex Mono,monospace;font-size:9px;color:'+dc+';font-weight:600">'+(v===null?'—':v+'%')+'</div>' +
        '<div style="width:22px;height:22px;border-radius:50%;background:'+dc+'33;border:1.5px solid '+dc+';display:flex;align-items:center;justify-content:center;font-size:8px;color:'+dc+'">'+label+'</div>' +
      '</div>';
    }).join('');

    // Cat bars
    const catBars = TS_ALL_CATS.map(cat=>{
      const h=cr.filter(r=>r.cat===cat).reduce((a,r)=>a+r.h,0);
      if(!h) return '';
      const cc=TS_CAT_COLORS[cat]||'#6C3FFF';
      const pct=Math.round(h/tot*100);
      return '<div style="margin-bottom:4px">' +
        '<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:2px">' +
          '<span>'+cat.replace(/^\d+\. /,'')+'</span>' +
          '<span style="font-family:IBM Plex Mono,monospace;color:'+cc+'">'+pct+'%</span></div>' +
        '<div style="height:3px;background:var(--bg4);border-radius:2px"><div style="width:'+pct+'%;height:100%;background:'+cc+';border-radius:2px"></div></div>' +
      '</div>';
    }).join('');

    // Top 4 clients
    const cliMap={};
    cr.filter(r=>r.b).forEach(r=>{cliMap[r.cl]=(cliMap[r.cl]||0)+r.h;});
    const topCli=Object.entries(cliMap).sort((a,b)=>b[1]-a[1]).slice(0,4)
      .map(([cl,h])=>'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);padding:2px 0;border-bottom:1px solid var(--border)">' +
        '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+cl.replace(/^\d+\.\s*/,'')+'</span>' +
        '<span style="font-family:IBM Plex Mono,monospace;color:var(--text2);padding-left:8px;flex-shrink:0">'+Math.round(h)+'h</span></div>')
      .join('');

    return '<div style="background:var(--bg2);border:1px solid '+col+'33;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px '+col+'15">' +
      '<div style="background:linear-gradient(90deg,'+col+'22,transparent);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)">' +
        '<div style="display:flex;align-items:center;gap:10px">' +
          '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,'+col+'CC,'+col+'55);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff">'+colab[0]+'</div>' +
          '<div><div style="font-size:13px;font-weight:600;color:var(--text)">'+colab+'</div>' +
          '<div style="font-size:10px;color:var(--text3)">'+Math.round(tot)+'h totais · '+Math.round(bill)+'h bill.</div></div>' +
        '</div>' +
        '<div style="text-align:right">' +
          '<div style="font-size:24px;font-weight:700;font-family:IBM Plex Mono,monospace;background:linear-gradient(135deg,'+col+','+col+'99);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">'+charg+'%</div>' +
          '<span style="font-size:9px;padding:2px 6px;border-radius:8px;background:'+bg+';color:'+col+'">'+label+'</span>' +
        '</div>' +
      '</div>' +
      '<div style="padding:10px 14px 4px">' +
        '<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:4px"><span>Chargeability</span><span style="font-family:IBM Plex Mono,monospace">Meta: '+CHARGE_TARGET+'%</span></div>' +
        '<div style="height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;position:relative">' +
          '<div style="width:'+Math.max(charg,2)+'%;height:100%;border-radius:4px;background:linear-gradient(90deg,'+col+'EE,'+col+'88)"></div>' +
          '<div style="position:absolute;top:0;left:'+CHARGE_TARGET+'%;width:2px;height:100%;background:#FF9B00BB"></div>' +
        '</div>' +
      '</div>' +
      '<div style="padding:8px 14px 10px;display:flex;gap:8px;justify-content:space-around">'+dotsHtml+'</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--border)">' +
        '<div style="padding:10px 14px;border-right:1px solid var(--border)"><div style="font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Por Categoria</div>'+catBars+'</div>' +
        '<div style="padding:10px 14px"><div style="font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Top Clientes Billable</div>'+topCli+'</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── Rank table ────────────────────────────────────────────────────────
function tsRenderRankTable(rows) {
  const tbody=document.getElementById('tsRankBody');
  const countEl=document.getElementById('tsRankCount');
  if (!tbody) return;
  const colabs=[...new Set(rows.map(r=>r.c))].sort();
  const data = colabs.map(colab=>{
    const cr=rows.filter(r=>r.c===colab);
    const total=cr.reduce((a,r)=>a+r.h,0);
    const billable=cr.filter(r=>r.b).reduce((a,r)=>a+r.h,0);
    return {colab,total:Math.round(total),billable:Math.round(billable),non_billable:Math.round(total-billable),chargeability:total>0?Math.round(billable/total*100):0};
  }).sort((a,b)=>{
    const va=a[tsRankSortCol], vb=b[tsRankSortCol];
    return typeof va==='string'?va.localeCompare(vb)*tsRankSortDir:(va-vb)*tsRankSortDir;
  });
  tbody.innerHTML = data.map((r,i)=>{
    const c=r.chargeability;
    const col=c>=CHARGE_TARGET?'#00C8A0':c>=50?'#FF9B00':'#FF5C6A';
    const lbl=c>=CHARGE_TARGET?'✅ Meta':c>=50?'🟡 Atenção':'🔴 Abaixo';
    return '<tr>' +
      '<td class="mono" style="font-size:11px;color:var(--text3)">'+(i+1)+'</td>' +
      '<td style="font-weight:500">'+r.colab+'</td>' +
      '<td class="mono">'+r.total+'h</td>' +
      '<td class="mono" style="color:#00C8A0">'+r.billable+'h</td>' +
      '<td class="mono" style="color:#FF5C6A">'+r.non_billable+'h</td>' +
      '<td class="mono" style="color:'+col+';font-weight:600">'+c+'%</td>' +
      '<td><div style="width:100px;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;position:relative">' +
        '<div style="width:'+Math.max(c,2)+'%;height:100%;background:linear-gradient(90deg,'+col+'EE,'+col+'66);border-radius:3px"></div>' +
        '<div style="position:absolute;top:0;left:'+CHARGE_TARGET+'%;width:1.5px;height:100%;background:#FF9B00BB"></div>' +
      '</div></td>' +
      '<td><span style="font-size:9px;padding:2px 7px;border-radius:8px;background:'+col+'22;color:'+col+'">'+lbl+'</span></td>' +
    '</tr>';
  }).join('');
  if (countEl) countEl.textContent=data.length+' colaboradores';
}

// ── Dropdown filter interactions ──────────────────────────────────────
function tsDdToggle(grp) {
  const menu = document.getElementById('tsMenu_'+grp);
  if (!menu) return;
  const isOpen = menu.classList.contains('ts-dd-open');
  // close all
  document.querySelectorAll('.ts-dd-menu').forEach(m=>m.classList.remove('ts-dd-open'));
  document.querySelectorAll('.ts-dd-btn').forEach(b=>b.classList.remove('ts-dd-active'));
  if (!isOpen) {
    menu.classList.add('ts-dd-open');
    document.getElementById('tsBtn_'+grp).classList.add('ts-dd-active');
  }
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.ts-dd-wrap') && !e.target.closest('.ts-dd-menu')) {
    document.querySelectorAll('.ts-dd-menu').forEach(m=>m.classList.remove('ts-dd-open'));
    document.querySelectorAll('.ts-dd-btn').forEach(b=>b.classList.remove('ts-dd-active'));
  }
});

// Item click handler (event delegation on menu)
document.addEventListener('click', function(e) {
  const item = e.target.closest('.ts-dd-item');
  if (!item) return;
  const grp = item.dataset.group;
  const val = item.dataset.val;
  if (!grp || !val) return;

  if (grp === 'tipo') {
    // radio behaviour
    TSF.tipo = val;
    document.querySelectorAll('.ts-dd-item.ts-dd-radio').forEach(el=>{
      el.classList.toggle('ts-dd-selected', el.dataset.val === val);
    });
  } else {
    // checkbox behaviour — coerce anos to number
    const coercedVal = grp === 'anos' ? parseInt(val) : val;
    const arr = TSF[grp];
    if (arr.includes(coercedVal)) {
      TSF[grp] = arr.filter(v=>v !== coercedVal);
      item.classList.remove('ts-dd-selected');
    } else {
      arr.push(coercedVal);
      item.classList.add('ts-dd-selected');
    }
  }

  tsUpdateBtnLabel(grp);
  tsRenderActivePills();
  tsUpdateFilterBadge();
  Object.values(tsCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  tsCharts={};
  requestAnimationFrame(()=>tsRefreshAll());
});

function tsDdSearch(input, grp) {
  const q = input.value.toLowerCase();
  const list = document.getElementById('tsDdList_'+grp);
  if (!list) return;
  list.querySelectorAll('.ts-dd-item').forEach(el=>{
    const txt = (el.textContent||'').toLowerCase();
    el.style.display = txt.includes(q) ? '' : 'none';
  });
}

function tsUpdateBtnLabel(grp) {
  const lbl = document.getElementById('tsLbl_'+grp);
  if (!lbl) return;
  const DEFAULTS = {colabs:'Colaborador',anos:'Ano',meses:'Mês',cats:'Categoria',tipo:'Tipo',clientes:'Cliente / Contrato'};
  if (grp === 'tipo') {
    const v = TSF.tipo;
    lbl.textContent = v === 'todos' ? DEFAULTS.tipo : (v === 'billable' ? 'Billable' : 'Non-Billable');
    const btn = document.getElementById('tsBtn_tipo');
    if (btn) btn.classList.toggle('ts-dd-has-val', v !== 'todos');
  } else {
    const arr = TSF[grp];
    const btn = document.getElementById('tsBtn_'+grp);
    if (arr.length === 0) {
      lbl.textContent = DEFAULTS[grp];
      if (btn) btn.classList.remove('ts-dd-has-val');
    } else if (arr.length === 1) {
      lbl.textContent = String(arr[0]).replace(/^\d+\.\s*/,'');
      if (btn) btn.classList.add('ts-dd-has-val');
    } else {
      lbl.textContent = DEFAULTS[grp]+' ('+arr.length+')';
      if (btn) btn.classList.add('ts-dd-has-val');
    }
  }
}

function tsSyncFilterUI() {
  // Mark selected items
  document.querySelectorAll('.ts-dd-item').forEach(el=>{
    const grp = el.dataset.group;
    const val = el.dataset.val;
    if (grp === 'tipo') {
      el.classList.toggle('ts-dd-selected', val === TSF.tipo);
    } else {
      const arr = TSF[grp];
      const coercedVal = grp === 'anos' ? parseInt(val) : val;
      el.classList.toggle('ts-dd-selected', Array.isArray(arr) && arr.includes(coercedVal));
    }
  });
  ['colabs','anos','meses','cats','tipo','clientes'].forEach(g=>tsUpdateBtnLabel(g));
}

function tsClearAll() {
  TSF={colabs:[],anos:[],meses:[],cats:[],clientes:[],tipo:'todos'};
  document.querySelectorAll('.ts-dd-item').forEach(el=>{
    el.classList.remove('ts-dd-selected');
    if (el.classList.contains('ts-dd-radio') && el.dataset.val==='todos') el.classList.add('ts-dd-selected');
  });
  ['colabs','anos','meses','cats','tipo','clientes'].forEach(g=>tsUpdateBtnLabel(g));
  tsRenderActivePills();
  tsUpdateFilterBadge();
  Object.values(tsCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  tsCharts={};
  requestAnimationFrame(()=>tsRefreshAll());
}

function tsRenderActivePills() {
  const el=document.getElementById('tsActivePills');
  if(!el) return;
  const pills=[];
  const LABELS={colabs:'Colab',anos:'Ano',meses:'Mês',cats:'Cat',clientes:'Cliente'};
  Object.entries(LABELS).forEach(([grp,lbl])=>{
    TSF[grp].forEach(v=>{
      pills.push('<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(79,142,255,.10);border:1px solid rgba(79,142,255,.22);color:var(--text2)">' +
        '<span style="color:var(--text3);font-size:9px">'+lbl+':</span>'+String(v).replace(/^\d+\.\s*/,'') +
        '<span style="cursor:pointer;color:var(--text3);font-size:11px" data-rgrp="'+grp+'" data-rval="'+String(v).replace(/"/g,'&quot;')+'" onclick="tsRemovePill(this.dataset.rgrp,this.dataset.rval)">×</span></span>');
    });
  });
  if (TSF.tipo!=='todos') pills.push('<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(79,142,255,.10);border:1px solid rgba(79,142,255,.22);color:var(--text2)">' +
    '<span style="color:var(--text3);font-size:9px">Tipo:</span>'+TSF.tipo+
    '<span style="cursor:pointer;color:var(--text3);font-size:11px;padding-left:2px" onclick="tsClearTipo()">×</span></span>');
  el.innerHTML = pills.join('');
}

function tsRemovePill(grp, val) {
  if (grp==='anos') val=parseInt(val);
  TSF[grp]=TSF[grp].filter(v=>v!==val);
  tsSyncFilterUI();
  Object.values(tsCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  tsCharts={};
  requestAnimationFrame(()=>tsRefreshAll());
}

function tsClearTipo() {
  TSF.tipo='todos';
  document.querySelectorAll('.ts-dd-item.ts-dd-radio').forEach(el=>{
    el.classList.toggle('ts-dd-selected', el.dataset.val==='todos');
  });
  tsUpdateBtnLabel('tipo');
  tsRenderActivePills();
  tsUpdateFilterBadge();
  Object.values(tsCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  tsCharts={};
  requestAnimationFrame(()=>tsRefreshAll());
}

function tsUpdateFilterBadge() {
  const n=tsActiveFiltersCount();
  const badge=document.getElementById('tsFilterBadge');
  if(badge){badge.style.display=n>0?'inline':'none'; badge.textContent=n;}
}

function tsSortRank(col) {
  if(tsRankSortCol===col) tsRankSortDir*=-1; else {tsRankSortCol=col; tsRankSortDir=-1;}
  tsRenderRankTable(tsFiltered());
}

function orcRenderKpis(rows) {
  const el = document.getElementById('orcKpis');
  if (!el) return;
  const bud  = rows.reduce((a,r) => a + r.bud, 0);
  const exec = rows.reduce((a,r) => a + r.exec_total, 0);
  const saldo = bud - exec;
  const pct  = bud > 0 ? Math.round(exec/bud*100*10)/10 : 0;
  const acima = rows.filter(r => r.pct > 100).length;
  const fmt  = v => 'R$ ' + Math.abs(Math.round(v)).toLocaleString('pt-BR');
  el.innerHTML =
    orcKpi('Budget Total',    fmt(bud),  rows.length + ' itens',   'linear-gradient(90deg,#6C3FFF,#4F8EFF)') +
    orcKpi('Total Executado', fmt(exec), 'YTD 2026',               'linear-gradient(90deg,#00D4A0,#20C0FF)') +
    orcKpi('Saldo Disponível',fmt(saldo),saldo>=0?'dentro do budget':'ESTOURADO','linear-gradient(90deg,'+(saldo>=0?'#00C8A0,#00A080':'#FF5C6A,#FF8C00')+')') +
    orcKpi('% Executado',     pct+'%',   'do budget anual',        pct<=80?'linear-gradient(90deg,#4F8EFF,#6C3FFF)':'linear-gradient(90deg,#FF9B00,#FF5C6A)') +
    orcKpi('Acima Budget',    acima,     'itens estourados',        acima===0?'linear-gradient(90deg,#00C8A0,#20C0FF)':'linear-gradient(90deg,#FF5C6A,#FF8C00)');

  // Update global bar
  const gb = document.getElementById('orcGlobalBar');
  const gp = document.getElementById('orcGlobalPct');
  if (gb) gb.style.width = Math.min(pct, 100) + '%';
  if (gp) gp.textContent = pct + '%';
}

function orcKpi(label, val, sub, grad) {
  return '<div class="kpi-card"><div class="kpi-accent" style="background:' + grad + '"></div>' +
    '<div class="kpi-body"><div class="kpi-label">' + label + '</div>' +
    '<div class="kpi-value mono" style="font-size:18px">' + val + '</div>' +
    '<div class="kpi-sub mono">' + sub + '</div></div></div>';
}

function orcInitCharts(rows) {
  function destroyCanvas(id) {
    const el = document.getElementById(id); if (!el) return null;
    const ex = Chart.getChart(el); if (ex) ex.destroy(); return el;
  }
  const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  // ── 1. Monthly execution bar ────────────────────────────────────
  const mc = destroyCanvas('orcMonthBar');
  if (mc) {
    const ctx = mc.getContext('2d'); const h = mc.offsetHeight || 200;
    const execByMonth = MESES.map(m => rows.reduce((a,r) => a + (r.exec[m]||0), 0));
    const gBar = ctx.createLinearGradient(0,0,0,h);
    gBar.addColorStop(0,'#6C3FFFEE'); gBar.addColorStop(1,'#4F8EFF44');
    orcCharts.monthBar = new Chart(mc, {
      type:'bar',
      data:{labels:MESES, datasets:[{label:'Executado',data:execByMonth.map(v=>Math.round(v)),
        backgroundColor:gBar, borderRadius:6, borderSkipped:false, maxBarThickness:40}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},datalabels:{
          color:'#fff',font:{size:9,weight:'600'},anchor:'end',align:'start',
          formatter:v=>v>0?'R$ '+(v/1000).toFixed(0)+'k':''
        }},
        scales:{x:{grid:{display:false},ticks:{color:'#9096B0',font:{size:11}}},
          y:{display:true,beginAtZero:true,grid:{color:'rgba(255,255,255,0.04)'},
             ticks:{color:'#9096B0',font:{size:10},callback:v=>'R$ '+(v/1000).toFixed(0)+'k'}}}}
    });
  }

  // ── 2. Category donut ───────────────────────────────────────────
  const dc = destroyCanvas('orcCatDonut');
  if (dc) {
    const ctx2 = dc.getContext('2d'); const w2=dc.offsetWidth||200, h2=dc.offsetHeight||200;
    const catNames  = ORC_MKT_CATS.map(c => c.cat);
    const catExecs  = catNames.map(cn => rows.filter(r=>r.conta===cn || r.conta.replace(/ - Marketing/,'')=== cn).reduce((a,r)=>a+r.exec_total,0));
    const grads = catNames.map((cn,i) => {
      const col = Object.values(ORC_CAT_COLORS)[i] || '#6C3FFF';
      const g = ctx2.createRadialGradient(w2/2,h2/2,h2*.15,w2/2,h2/2,h2*.48);
      g.addColorStop(0,col+'EE'); g.addColorStop(1,col+'55'); return g;
    });
    orcCharts.catDonut = new Chart(dc, {type:'doughnut',
      data:{labels:catNames.map(c=>c.replace(/ - Marketing/,'')),
        datasets:[{data:catExecs.map(v=>Math.round(v)),backgroundColor:grads,borderWidth:0,cutout:'64%',hoverOffset:5}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},datalabels:{color:'#fff',font:{size:9,weight:'600'},
          formatter:(v,ctx)=>{const tot=ctx.dataset.data.reduce((a,b)=>a+b,0);return tot>0&&v>0?Math.round(v/tot*100)+'%':'';}}}}
    });
    const leg = document.getElementById('orcCatLeg');
    if (leg) leg.innerHTML = '<div class="chart-legend">' +
      catNames.map((cn,i) => '<div class="legend-item"><div class="legend-dot" style="background:'+Object.values(ORC_CAT_COLORS)[i]+'"></div>'+cn.replace(/ - Marketing/,'')+'</div>').join('') + '</div>';
  }

  // ── 3. Category grouped bar: budget vs exec ────────────────────
  const cb = destroyCanvas('orcCatBar');
  if (cb) {
    const ctx3 = cb.getContext('2d'); const h3 = cb.offsetHeight||220;
    const labels = ORC_MKT_CATS.map(c=>c.cat.replace(/ - Marketing/,'').replace('Custos com Eventos','Eventos').replace('Outras Custos','Outros').replace('Publicidade e Propaganda','Publicidade'));
    const budData = ORC_MKT_CATS.map(c => c.bud);
    const exeData = ORC_MKT_CATS.map(c => c.exec);
    const gBud = ctx3.createLinearGradient(0,0,0,h3);
    gBud.addColorStop(0,'rgba(108,63,255,0.25)'); gBud.addColorStop(1,'rgba(108,63,255,0.06)');
    const gExe = ctx3.createLinearGradient(0,0,0,h3);
    gExe.addColorStop(0,'rgba(0,200,160,0.85)'); gExe.addColorStop(1,'rgba(0,200,160,0.35)');
    orcCharts.catBar = new Chart(cb, {type:'bar',
      data:{labels, datasets:[
        {label:'Budget',  data:budData, backgroundColor:gBud, borderColor:'#6C3FFF55', borderWidth:1, borderRadius:4, maxBarThickness:32},
        {label:'Executado',data:exeData,backgroundColor:gExe, borderColor:'#00C8A055', borderWidth:1, borderRadius:4, maxBarThickness:32}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#9096B0',font:{size:10},boxWidth:10}},datalabels:{display:false}},
        scales:{x:{grid:{display:false},ticks:{color:'#9096B0',font:{size:9},maxRotation:30}},
          y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.04)'},
             ticks:{color:'#9096B0',font:{size:9},callback:v=>'R$ '+(v/1000).toFixed(0)+'k'}}}}
    });
  }

  // ── 4. Project grouped bar ─────────────────────────────────────
  const pb = destroyCanvas('orcProjBar');
  if (pb) {
    const ctx4 = pb.getContext('2d'); const h4 = pb.offsetHeight||220;
    const topProjs = ORC_MKT_PROJS.slice(0,6);
    const gBud2 = ctx4.createLinearGradient(0,0,0,h4);
    gBud2.addColorStop(0,'rgba(79,142,255,0.25)'); gBud2.addColorStop(1,'rgba(79,142,255,0.06)');
    const gExe2 = ctx4.createLinearGradient(0,0,0,h4);
    gExe2.addColorStop(0,'rgba(255,155,0,0.85)'); gExe2.addColorStop(1,'rgba(255,155,0,0.35)');
    orcCharts.projBar = new Chart(pb, {type:'bar',
      data:{labels:topProjs.map(p=>p.proj.replace('Branding - ','').replace('Infraestrutura de ','Infra ')),
        datasets:[
          {label:'Budget',   data:topProjs.map(p=>p.bud),  backgroundColor:gBud2, borderColor:'#4F8EFF55', borderWidth:1, borderRadius:4, maxBarThickness:32},
          {label:'Executado',data:topProjs.map(p=>p.exec), backgroundColor:gExe2, borderColor:'#FF9B0055', borderWidth:1, borderRadius:4, maxBarThickness:32}
        ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#9096B0',font:{size:10},boxWidth:10}},datalabels:{display:false}},
        scales:{x:{grid:{display:false},ticks:{color:'#9096B0',font:{size:9},maxRotation:30}},
          y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.04)'},
             ticks:{color:'#9096B0',font:{size:9},callback:v=>'R$ '+(v/1000).toFixed(0)+'k'}}}}
    });
  }
}

let orcSearchQ = '';
function orcRenderTable(rows) {
  const tbody = document.getElementById('orcTableBody');
  const count = document.getElementById('orcTableCount');
  if (!tbody) return;
  let data = [...rows];
  if (orcSearchQ) data = data.filter(r => r.desc.toLowerCase().includes(orcSearchQ) || r.conta.toLowerCase().includes(orcSearchQ) || r.proj.toLowerCase().includes(orcSearchQ));
  data.sort((a,b) => {
    const va = a[orcSortCol], vb = b[orcSortCol];
    return typeof va === 'string' ? va.localeCompare(vb)*orcSortDir : (va-vb)*orcSortDir;
  });
  const fmtR = v => 'R$ ' + Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
  tbody.innerHTML = data.map(r => {
    const col = r.pct > 100 ? '#FF5C6A' : r.pct === 0 ? '#8890B0' : '#00C8A0';
    const lbl = r.pct > 100 ? '🔴 Acima' : r.pct === 0 ? '⚪ Sem exec.' : '✅ Exec.';
    const catCol = ORC_CAT_COLORS[r.conta] || '#6C3FFF';
    const projCol = ORC_PROJ_COLORS[r.proj] || '#4F8EFF';
    const barW = Math.min(Math.max(r.pct, 2), 100);
    const barColor = r.pct > 100 ? '#FF5C6A' : '#00C8A0';
    return '<tr class="' + (r.pct > 100 ? 'risk-row' : '') + '">' +
      '<td><span class="dir-badge" style="background:' + catCol + '22;color:' + catCol + ';font-size:9px">' + r.conta.replace(/ - Marketing/,'') + '</span></td>' +
      '<td style="font-size:12px;max-width:200px"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + r.desc + '">' + r.desc + '</div>' +
        (r.obs ? '<div style="font-size:9px;color:var(--text3);margin-top:2px">' + r.obs + '</div>' : '') + '</td>' +
      '<td><span style="font-size:9px;padding:2px 6px;border-radius:6px;background:' + projCol + '22;color:' + projCol + '">' + r.proj.replace('Branding - ','') + '</span></td>' +
      '<td class="mono" style="font-size:11px">' + fmtR(r.bud) + '</td>' +
      '<td class="mono" style="font-size:11px;color:var(--text2)">' + fmtR(r.exec_total) + '</td>' +
      '<td class="mono" style="font-size:11px;color:' + (r.variacao >= 0 ? '#00C8A0' : '#FF5C6A') + '">' + (r.variacao >= 0 ? '+' : '-') + fmtR(r.variacao) + '</td>' +
      '<td class="mono" style="font-size:11px;color:' + col + ';font-weight:600">' + r.pct + '%</td>' +
      '<td><div style="width:80px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;position:relative">' +
        '<div style="width:' + barW + '%;height:100%;background:linear-gradient(90deg,' + barColor + 'EE,' + barColor + '66);border-radius:3px"></div>' +
      '</div></td>' +
    '</tr>';
  }).join('');
  if (count) count.textContent = data.length + ' itens';
}

// ── Orçamento filter interactions ──────────────────────────────────────
function orcDdToggle(grp) {
  const menu = document.getElementById('orcMenu_' + grp);
  if (!menu) return;
  const isOpen = menu.classList.contains('ts-dd-open');
  document.querySelectorAll('[id^="orcMenu_"]').forEach(m => m.classList.remove('ts-dd-open'));
  document.querySelectorAll('[id^="orcBtn_"]').forEach(b => b.classList.remove('ts-dd-active'));
  if (!isOpen) {
    menu.classList.add('ts-dd-open');
    document.getElementById('orcBtn_' + grp).classList.add('ts-dd-active');
  }
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('[id^="orcMenu_"]') && !e.target.closest('[id^="orcBtn_"]')) {
    document.querySelectorAll('[id^="orcMenu_"]').forEach(m => m.classList.remove('ts-dd-open'));
    document.querySelectorAll('[id^="orcBtn_"]').forEach(b => b.classList.remove('ts-dd-active'));
  }
  const item = e.target.closest('[data-orc-group]');
  if (!item) return;
  const grp = item.dataset.orcGroup;
  const val = item.dataset.orcVal;
  if (grp === 'status') {
    orcF.status = val;
    document.querySelectorAll('.orc-status-item').forEach(el => el.classList.toggle('ts-dd-selected', el.dataset.orcVal === val));
    const lbl = document.getElementById('orcLbl_status');
    if (lbl) lbl.textContent = val === '' ? 'Status' : item.textContent.replace(/[✅🔴⚪]/,'').trim();
    const btn = document.getElementById('orcBtn_status');
    if (btn) btn.classList.toggle('ts-dd-has-val', val !== '');
  } else {
    const arr = orcF[grp];
    if (arr.includes(val)) { orcF[grp] = arr.filter(v=>v!==val); item.classList.remove('ts-dd-selected'); }
    else { arr.push(val); item.classList.add('ts-dd-selected'); }
    const lbl = document.getElementById('orcLbl_' + grp);
    const btn = document.getElementById('orcBtn_' + grp);
    const DEFAULTS = {cats:'Categoria',projs:'Projeto'};
    if (lbl) lbl.textContent = orcF[grp].length === 0 ? DEFAULTS[grp] : orcF[grp].length === 1 ? orcF[grp][0].replace(/ - Marketing/,'') : DEFAULTS[grp]+' ('+orcF[grp].length+')';
    if (btn) btn.classList.toggle('ts-dd-has-val', orcF[grp].length > 0);
  }
  orcRefresh();
});

function orcRefresh() {
  const rows = orcFiltered();
  Object.values(orcCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  orcCharts = {};
  requestAnimationFrame(() => { orcInitCharts(rows); orcRenderTable(rows); orcRenderKpis(rows); });
}

function orcClearAll() {
  orcF = {cats:[], projs:[], meses:[], status:''};
  document.querySelectorAll('[data-orc-group]').forEach(el => {
    el.classList.remove('ts-dd-selected');
    if (el.classList.contains('orc-status-item') && el.dataset.orcVal === '') el.classList.add('ts-dd-selected');
  });
  ['cats','projs','status'].forEach(g => {
    const lbl = document.getElementById('orcLbl_' + g);
    const btn = document.getElementById('orcBtn_' + g);
    if (lbl) lbl.textContent = g === 'cats' ? 'Categoria' : g === 'projs' ? 'Projeto' : 'Status';
    if (btn) btn.classList.remove('ts-dd-has-val');
  });
  orcRefresh();
}

function orcSearchFn(v) { orcSearchQ = v.toLowerCase(); orcRenderTable(orcFiltered()); }
function orcSort(col) {
  if (orcSortCol === col) orcSortDir *= -1; else { orcSortCol = col; orcSortDir = -1; }
  orcRenderTable(orcFiltered());
}

// ═══════════════════════════════════════════
// INTERACTIONS (global functions)
// ═══════════════════════════════════════════
function setSetor(s) { S.setor=s; linePageStart=0; lineSectorFilter='Todos'; render(); }
function applyFilter() {
  S.persp = document.getElementById('fPersp').value;
  S.nivel = document.getElementById('fNivel').value;
  S.status = document.getElementById('fStatus').value;
  linePageStart=0; render();
}
function clearFilters() {
  S.persp=''; S.nivel=''; S.status=''; S.q='';
  ['fPersp','fNivel','fStatus'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  const sb=document.getElementById('searchBox'); if(sb) sb.value='';
  linePageStart=0; render();
}
function onSearch(v) { S.q=v; linePageStart=0; buildTable(filtered()); }
function sortBy(col) {
  if (S.col===col) S.sortDir*=-1; else { S.col=col; S.sortDir=1; }
  buildTable(filtered());
}
function setLineSector(s) { lineSectorFilter=s; linePageStart=0; buildLineSection(filtered()); }
function linePage(dir) {
  const rows = filtered();
  const cands = lineSectorFilter==='Todos' ? rows : rows.filter(r=>r.setor===lineSectorFilter);
  linePageStart = Math.max(0, Math.min(linePageStart + dir*6, Math.floor((cands.length-1)/6)*6));
  renderLineCards(cands);
}
function planoFilter() {
  pFilterStatus = document.getElementById('pFStatus')?.value||'';
  pFilterBsc = document.getElementById('pFBsc')?.value||'';
  renderPlanoTable();
}
function planoSearch(v) { pSearch=v; renderPlanoTable(); }
function sortPlano(col) {
  if(pSortCol===col) pSortDir*=-1; else { pSortCol=col; pSortDir=1; }
  renderPlanoTable();
}
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', t==='dark'?'light':'dark');
  render();
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  const opts = {day:'2-digit',month:'2-digit',year:'numeric'};
  document.getElementById('navDate').textContent = now.toLocaleDateString('pt-BR', opts);
  render();
});
</script>
